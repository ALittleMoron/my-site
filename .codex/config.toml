[mcp_servers.my_site_matrix]
command = "bash"
args = ["infra/scripts/agent_bridge.sh"]
enabled_tools = [
  "claim_next_matrix_question",
  "get_matrix_authoring_context",
  "search_matrix_resources",
  "save_matrix_question_draft",
  "release_matrix_question_claim",
]
default_tools_approval_mode = "prompt"

[mcp_servers.my_site_matrix.tools.claim_next_matrix_question]
approval_mode = "approve"

[mcp_servers.my_site_matrix.tools.get_matrix_authoring_context]
approval_mode = "approve"

[mcp_servers.my_site_matrix.tools.search_matrix_resources]
approval_mode = "approve"

[mcp_servers.my_site_matrix.tools.save_matrix_question_draft]
approval_mode = "approve"

[mcp_servers.my_site_matrix.tools.release_matrix_question_claim]
approval_mode = "approve"
