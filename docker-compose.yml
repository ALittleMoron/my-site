x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: my_site_application:${IMAGE_TAG:-latest}
  user: "10001:10001"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:mode=1777,uid=10001,gid=10001
  networks:
    - app-network
  environment: &backend-environment
    APP_CONTACT_REQUESTS_ENABLED: ${APP_CONTACT_REQUESTS_ENABLED}
    APP_DEBUG: ${APP_DEBUG}
    APP_DOMAIN: ${APP_DOMAIN}
    APP_SECRET_KEY_FILE: /run/secrets/app_secret_key
    APP_URL_SCHEMA: ${APP_URL_SCHEMA}
    APP_USE_CACHE: ${APP_USE_CACHE}
    AUTH_PRIVATE_KEY_FILE: /run/secrets/auth_private_key
    AUTH_PUBLIC_KEY: ${AUTH_PUBLIC_KEY}
    AUTH_TOKEN_EXPIRE_SECONDS: ${AUTH_TOKEN_EXPIRE_SECONDS}
    AUTH_TOKEN_HEADER_NAME: ${AUTH_TOKEN_HEADER_NAME}
    AUTH_TOKEN_PREFIX: ${AUTH_TOKEN_PREFIX}
    CACHE_WARM_ARTICLES_PAGE_SIZE: ${CACHE_WARM_ARTICLES_PAGE_SIZE}
    COMPETENCY_MATRIX_QUESTION_SUGGESTION_ANONYMOUS_DAILY_LIMIT: ${COMPETENCY_MATRIX_QUESTION_SUGGESTION_ANONYMOUS_DAILY_LIMIT}
    DB_DRIVER: ${DB_DRIVER}
    DB_EXPIRE_ON_COMMIT: ${DB_EXPIRE_ON_COMMIT}
    DB_HOST: ${DB_HOST}
    DB_LOG_QUERY_METRICS: ${DB_LOG_QUERY_METRICS}
    DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
    DB_NAME: ${DB_NAME}
    DB_PASSWORD_FILE: /run/secrets/db_password
    DB_POOL_PRE_PING: ${DB_POOL_PRE_PING}
    DB_POOL_SIZE: ${DB_POOL_SIZE}
    DB_PORT: ${DB_PORT}
    DB_SLOW_QUERY_LOG_STATEMENT_MAX_LENGTH: ${DB_SLOW_QUERY_LOG_STATEMENT_MAX_LENGTH}
    DB_SLOW_QUERY_LOG_THRESHOLD_MS: ${DB_SLOW_QUERY_LOG_THRESHOLD_MS}
    DB_USER: ${DB_USER}
    I18N_DEFAULT_LANGUAGE: ${I18N_DEFAULT_LANGUAGE}
    MINIO_ACCESS_KEY_FILE: /run/secrets/minio_access_key
    MINIO_CORS_MAX_AGE_SECONDS: ${MINIO_CORS_MAX_AGE_SECONDS}
    MINIO_HOST: ${MINIO_HOST}
    MINIO_PORT: ${MINIO_PORT}
    MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
    MINIO_REGION: ${MINIO_REGION}
    MINIO_SECRET_KEY_FILE: /run/secrets/minio_secret_key
    MINIO_SECURE: ${MINIO_SECURE}
    OWNER_INIT_LOGIN: ${OWNER_INIT_LOGIN}
    OWNER_INIT_PASSWORD_FILE: /run/secrets/owner_init_password
    SENTRY_DSN_FILE: /run/secrets/sentry_dsn
    SENTRY_USE: ${SENTRY_USE}
    TASKIQ_CACHE_WARM_INTERVAL_SECONDS: ${TASKIQ_CACHE_WARM_INTERVAL_SECONDS}
    TASKIQ_RESULT_EXPIRE_SECONDS: ${TASKIQ_RESULT_EXPIRE_SECONDS}
    VALKEY_HOST: ${VALKEY_HOST}
    VALKEY_PORT: ${VALKEY_PORT}
  secrets: &backend-secrets
    - source: app_secret_key
      target: app_secret_key
    - source: auth_private_key
      target: auth_private_key
    - source: db_password
      target: db_password
    - source: minio_access_key
      target: minio_access_key
    - source: minio_secret_key
      target: minio_secret_key
    - source: owner_init_password
      target: owner_init_password
    - source: sentry_dsn
      target: sentry_dsn

x-backend-healthcheck: &backend-healthcheck
  test:
    [
      "CMD-SHELL",
      "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/healthcheck/ready', timeout=3).close()\"",
    ]
  interval: 5s
  timeout: 5s
  retries: 24

x-frontend-build: &frontend-build
  build:
    context: ./frontend
    dockerfile: Dockerfile
  image: my_site_frontend:${IMAGE_TAG:-latest}
  user: "1000:1000"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:mode=1777,uid=1000,gid=1000
  environment:
    - PORT=4000
    - APP_URL_SCHEMA=${APP_URL_SCHEMA}
    - APP_DOMAIN=${APP_DOMAIN}
    - SSR_PUBLIC_ORIGIN=${APP_URL_SCHEMA}://${APP_DOMAIN}
    - NG_ALLOWED_HOSTS=${APP_DOMAIN}
  restart: unless-stopped
  networks:
    - app-network

x-frontend-healthcheck: &frontend-healthcheck
  test:
    [
      "CMD-SHELL",
      "node -e \"fetch('http://127.0.0.1:4000/healthz').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
    ]
  interval: 5s
  timeout: 5s
  retries: 24

x-process-healthcheck: &process-healthcheck
  test: ["CMD-SHELL", "python -c \"import os, signal; os.kill(1, 0)\""]
  interval: 10s
  timeout: 5s
  retries: 6

services:
  backend-blue:
    <<: *backend-build
    container_name: my_site_backend_blue
    command: bash start_application.sh run
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck: *backend-healthcheck

  backend-green:
    <<: *backend-build
    container_name: my_site_backend_green
    command: bash start_application.sh run
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck: *backend-healthcheck

  backend-init:
    <<: *backend-build
    command: bash start_application.sh init
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: "no"

  taskiq-worker:
    <<: *backend-build
    command: bash start_application.sh taskiq-worker
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck: *process-healthcheck

  # Keep exactly one scheduler process running; scale workers instead.
  taskiq-scheduler:
    <<: *backend-build
    container_name: my_site_taskiq_scheduler
    command: bash start_application.sh taskiq-scheduler
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck: *process-healthcheck

  frontend-blue:
    <<: *frontend-build
    container_name: my_site_frontend_blue
    environment:
      - PORT=4000
      - APP_URL_SCHEMA=${APP_URL_SCHEMA}
      - APP_DOMAIN=${APP_DOMAIN}
      - SSR_API_ORIGIN=http://backend-blue:8080
      - SSR_PUBLIC_ORIGIN=${APP_URL_SCHEMA}://${APP_DOMAIN}
      - NG_ALLOWED_HOSTS=${APP_DOMAIN}
    healthcheck: *frontend-healthcheck

  frontend-green:
    <<: *frontend-build
    container_name: my_site_frontend_green
    environment:
      - PORT=4000
      - APP_URL_SCHEMA=${APP_URL_SCHEMA}
      - APP_DOMAIN=${APP_DOMAIN}
      - SSR_API_ORIGIN=http://backend-green:8080
      - SSR_PUBLIC_ORIGIN=${APP_URL_SCHEMA}://${APP_DOMAIN}
      - NG_ALLOWED_HOSTS=${APP_DOMAIN}
    healthcheck: *frontend-healthcheck

  valkey:
    image: valkey/valkey:9.0.1
    container_name: my_site_valkey
    user: "999:999"
    volumes:
      - valkey_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 60s
      retries: 12

  postgres:
    image: postgres:18.4-alpine
    container_name: my_site_postgres
    user: "70:70"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${DB_NAME}
    secrets:
      - source: db_password
        target: db_password
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 60s
      retries: 12

  minio:
    build:
      context: .
      dockerfile: infra/minio/Dockerfile
    image: my_site_minio:${IMAGE_TAG:-latest}
    container_name: my_site_minio
    user: "10002:10002"
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: ${APP_URL_SCHEMA}://${APP_DOMAIN}
    secrets:
      - source: minio_access_key
        target: minio_access_key
      - source: minio_secret_key
        target: minio_secret_key
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 60s
      retries: 12

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    image: my_site_nginx:${IMAGE_TAG:-latest}
    container_name: my_site_nginx
    user: "101:101"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,uid=101,gid=101
    volumes:
      - ./infra/nginx/certs:/certs:ro
      - certbot-www:/var/www/certbot:ro
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - SSL_CERT=${SSL_CERT}
      - SSL_KEY=${SSL_KEY}
      - ACTIVE_BACKEND_SLOT=${ACTIVE_BACKEND_SLOT:-backend-blue}
      - ACTIVE_FRONTEND_SLOT=${ACTIVE_FRONTEND_SLOT:-frontend-blue}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL}
    command: >
      sh -ec '
        mkdir -p /tmp/nginx-conf.d;
        envsubst "\$$APP_DOMAIN \$$SSL_CERT \$$SSL_KEY \$$ACTIVE_BACKEND_SLOT \$$ACTIVE_FRONTEND_SLOT \$$MINIO_PUBLIC_URL"
          < /etc/nginx/runtime-templates/site.conf.template
          > /tmp/nginx-conf.d/site.conf;
        exec nginx -g "daemon off;";
      '
    ports:
      - "80:8080"
      - "443:8443"
      - "${VPN_BIND_ADDRESS}:18081:18081"
      - "${VPN_BIND_ADDRESS}:18082:18082"
    depends_on:
      minio:
        condition: service_healthy
      databasus:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nginx -t && wget -q -O /dev/null http://127.0.0.1:8080/nginx-healthz",
        ]
      interval: 5s
      timeout: 10s
      retries: 12

  certbot:
    image: certbot/certbot:v5.2.2
    container_name: my_site_certbot
    profiles:
      - letsencrypt
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
    command: >
      certonly
      --webroot
      --webroot-path=/var/www/certbot
      --email ${LE_EMAIL}
      --agree-tos
      --no-eff-email
      --keep-until-expiring
      -d ${APP_DOMAIN}
      -d s3.${APP_DOMAIN}
    networks:
      - app-network

  cert-sync:
    image: alpine:3.22.2
    container_name: my_site_cert_sync
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - ./infra/nginx/certs:/certs
    command: >
      sh -ec '
        live_dir="/etc/letsencrypt/live/$${APP_DOMAIN}";
        if [ -f "$${live_dir}/fullchain.pem" ] && [ -f "$${live_dir}/privkey.pem" ]; then
          cp "$${live_dir}/fullchain.pem" /certs/fullchain.pem;
          cp "$${live_dir}/privkey.pem" /certs/privkey.pem;
          chown 101:101 /certs/fullchain.pem /certs/privkey.pem;
          chmod 640 /certs/fullchain.pem /certs/privkey.pem;
        else
          echo "No certbot certificate found for $${APP_DOMAIN}; keeping existing /certs files.";
        fi
      '

  databasus:
    container_name: my_site_databasus
    image: databasus/databasus:v3.47.1
    volumes:
      - databasus_data:/databasus-data
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  databasus_data:
  valkey_data:
  letsencrypt:
  certbot-www:

secrets:
  app_secret_key:
    file: ${COMPOSE_APP_SECRET_KEY_FILE:?COMPOSE_APP_SECRET_KEY_FILE must be set by infra/scripts/compose_secrets.sh}
  auth_private_key:
    file: ${COMPOSE_AUTH_PRIVATE_KEY_FILE:?COMPOSE_AUTH_PRIVATE_KEY_FILE must be set by infra/scripts/compose_secrets.sh}
  db_password:
    file: ${COMPOSE_DB_PASSWORD_FILE:?COMPOSE_DB_PASSWORD_FILE must be set by infra/scripts/compose_secrets.sh}
  minio_access_key:
    file: ${COMPOSE_MINIO_ACCESS_KEY_FILE:?COMPOSE_MINIO_ACCESS_KEY_FILE must be set by infra/scripts/compose_secrets.sh}
  minio_secret_key:
    file: ${COMPOSE_MINIO_SECRET_KEY_FILE:?COMPOSE_MINIO_SECRET_KEY_FILE must be set by infra/scripts/compose_secrets.sh}
  owner_init_password:
    file: ${COMPOSE_OWNER_INIT_PASSWORD_FILE:?COMPOSE_OWNER_INIT_PASSWORD_FILE must be set by infra/scripts/compose_secrets.sh}
  sentry_dsn:
    file: ${COMPOSE_SENTRY_DSN_FILE:?COMPOSE_SENTRY_DSN_FILE must be set by infra/scripts/compose_secrets.sh}
