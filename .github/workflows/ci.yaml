name: "test, lint and publish"

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  quality-backend:
    name: "Backend quality"
    uses: ./.github/workflows/_quality_backend.yaml

  quality-frontend:
    name: "Frontend quality"
    uses: ./.github/workflows/_quality_frontend.yaml

  docker-security:
    name: "Docker security"
    uses: ./.github/workflows/_docker.yaml

  security-infra:
    name: "Infrastructure security"
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: "Security check"
        run: make security-infra

  performance:
    name: "Performance smoke"
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs:
      - quality-backend
      - quality-frontend
    uses: ./.github/workflows/_performance.yaml
