name: "test, lint and publish"

on:
  push:
  workflow_dispatch:

jobs:
  quality-backend:
    name: "Backend quality"
    uses: ./.github/workflows/_quality_backend.yaml

  quality-frontend:
    name: "Frontend quality"
    uses: ./.github/workflows/_quality_frontend.yaml

  performance:
    name: "Performance smoke"
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs:
      - quality-backend
      - quality-frontend
    uses: ./.github/workflows/_performance.yaml
