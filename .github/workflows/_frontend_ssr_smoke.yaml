name: Frontend SSR smoke

on:
  workflow_call:

jobs:
  ssr-smoke:
    name: Frontend SSR smoke
    timeout-minutes: 20
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Node.js"
        uses: actions/setup-node@v7
        with:
          node-version: "24.16.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: "Run SSR smoke"
        run: make -C frontend ssr-smoke
