name: Backend Bandit

on:
  workflow_call:

jobs:
  backend-bandit:
    name: Backend Bandit
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"
      - name: "Install UV"
        uses: astral-sh/setup-uv@v8.2.0
        with:
          cache-suffix: "backend-bandit"
      - name: "Bandit"
        run: make -C backend security-bandit
