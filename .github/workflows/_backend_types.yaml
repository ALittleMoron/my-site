name: Backend types

on:
  workflow_call:

jobs:
  backend-types:
    name: Backend types
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"
      - name: "Install UV"
        uses: astral-sh/setup-uv@v8.2.0
      - name: "Type check"
        run: make -C backend types
