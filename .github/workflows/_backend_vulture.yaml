name: Backend Vulture

on:
  workflow_call:

jobs:
  backend-vulture:
    name: Backend Vulture
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Python"
        uses: actions/setup-python@v7
        with:
          python-version-file: "backend/pyproject.toml"
      - name: "Install UV"
        uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-suffix: "backend-vulture"
      - name: "Dead code scan"
        run: make -C backend vulture
