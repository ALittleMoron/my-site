name: Docker build, scan and optional push

on:
  workflow_call:
    inputs:
      push-images:
        required: false
        type: boolean
        default: false

jobs:
  docker:
    name: Docker build & security scan
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}
      APPLICATION_IMAGE: my_site_application
      FRONTEND_IMAGE: my_site_frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Application docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          tags: |
            ${{ env.APPLICATION_IMAGE }}:latest
            ${{ env.APPLICATION_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build Frontend docker image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Trivy infrastructure config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          hide-progress: true

      - name: Trivy Application image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.APPLICATION_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          hide-progress: true
          skip-setup-trivy: true

      - name: Trivy Frontend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          hide-progress: true
          skip-setup-trivy: true

      - name: Log in to Container Registry
        if: inputs.push-images
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Application docker image
        if: inputs.push-images
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker tag "${APPLICATION_IMAGE}:latest" "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_application:latest"
          docker tag "${APPLICATION_IMAGE}:${IMAGE_TAG}" "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_application:${IMAGE_TAG}"
          docker push "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_application:latest"
          docker push "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_application:${IMAGE_TAG}"

      - name: Push Frontend docker image
        if: inputs.push-images
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker tag "${FRONTEND_IMAGE}:latest" "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_frontend:latest"
          docker tag "${FRONTEND_IMAGE}:${IMAGE_TAG}" "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_frontend:${IMAGE_TAG}"
          docker push "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_frontend:latest"
          docker push "${DOCKER_REGISTRY}/${DOCKER_USERNAME}/my_site_frontend:${IMAGE_TAG}"
