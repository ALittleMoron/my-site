name: Quality (Frontend)

on:
  workflow_call:

jobs:
  quality-frontend:
    name: Frontend tests
    timeout-minutes: 30
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: "Install frontend dependencies"
        run: make install-frontend
      - name: "Format check"
        run: make -C frontend format-check
      - name: "Lint"
        run: make -C frontend lint
      - name: "Type check"
        run: make -C frontend typecheck
      - name: "Build frontend"
        run: make -C frontend build
      - name: "Run frontend tests with coverage"
        run: make tests-coverage-frontend
      - name: "Coverage Badge"
        run: |
          pip install -U genbadge defusedxml
          genbadge coverage -n frontend -i frontend/coverage/cobertura-coverage.xml -o .github/badges/coverage-frontend.svg
      - name: "Verify Changed files"
        uses: tj-actions/verify-changed-files@v16
        id: verify-changed-files
        with:
          files: .github/badges/coverage-frontend.svg
      - name: "Commit and push badge"
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.verify-changed-files.outputs.files_changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/badges/coverage-frontend.svg'
          message: 'Updated .github/badges/coverage-frontend.svg - project coverage have changed'
          pull: '--rebase --autostash'
          default_author: github_actions
