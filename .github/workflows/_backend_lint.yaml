name: Backend lint

on:
  workflow_call:

jobs:
  backend-lint:
    name: Backend lint
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"
      - name: "Install UV"
        uses: astral-sh/setup-uv@v8.3.0
        with:
          cache-suffix: "backend-lint"
      - name: "Ruff lint"
        run: make -C backend ruff-lint-check
