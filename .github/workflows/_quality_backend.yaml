name: Quality (Backend)

on:
  workflow_call:

jobs:
  quality-backend:
    name: Backend tests & quality
    timeout-minutes: 60
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_site_database_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 55432:5432
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"
      - name: "Install UV"
        uses: astral-sh/setup-uv@v6
      - name: "Install backend dependencies"
        run: make install-backend
      - name: "Format & lint check"
        run: make -C backend lint-check
      - name: "Type check"
        run: make -C backend types
      - name: "Security scan"
        continue-on-error: true
        run: make -C backend bandit
      - name: "Dead code scan"
        continue-on-error: true
        run: make -C backend vulture
      - name: "Run backend tests with coverage"
        run: make tests-coverage
      - name: "Coverage Badge"
        run: |
          pip install -U genbadge defusedxml
          genbadge coverage -n backend -i backend/coverage.xml -o .github/badges/coverage-backend.svg
      - name: "Verify Changed files"
        uses: tj-actions/verify-changed-files@v16
        id: verify-changed-files
        with:
          files: .github/badges/coverage-backend.svg
      - name: "Commit and push badge"
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/badges/coverage-backend.svg'
          message: 'Updated .github/badges/coverage-backend.svg - project coverage have changed'
          pull: '--rebase --autostash'
          default_author: github_actions
