name: Trivy config scan

on:
  workflow_call:

jobs:
  trivy-config-scan:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Trivy infrastructure config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          hide-progress: true
