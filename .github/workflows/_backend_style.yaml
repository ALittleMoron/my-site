name: Backend style

on:
  workflow_call:

jobs:
  backend-style:
    name: Backend style
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"
      - name: "Install UV"
        uses: astral-sh/setup-uv@v8.3.2
        with:
          cache-suffix: "backend-style"
      - name: "Format check"
        run: make -C backend format-check
