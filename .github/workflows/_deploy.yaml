name: Reusable deploy to production

on:
  workflow_call:
    inputs:
      issue_certificates:
        required: true
        type: boolean

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Render runtime .env
        env:
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_ENV_VARS_JSON: ${{ toJson(vars) }}
          GITHUB_SECRETS_JSON: ${{ toJson(secrets) }}
        run: >
          python3 infra/scripts/render_deploy_env.py
          --manifest infra/deploy/runtime-env.manifest.json
          --output .env

      - name: Prepare deploy payload
        run: |
          mkdir -p .deploy-payload
          cp -a Makefile docker-compose.yml backend/ frontend/ infra/ .env .deploy-payload/

      - name: Sync runtime files to server
        uses: burnett01/rsync-deployments@9.0.0
        with:
          switches: >-
            -avzr --delete
            --exclude '.git'
            --exclude '.deploy-state'
            --exclude 'node_modules'
            --exclude '.venv'
            --exclude 'infra/nginx/certs/*.pem'
          path: .deploy-payload/
          remote_path: ${{ vars.REMOTE_PATH }}
          remote_host: ${{ vars.REMOTE_HOST }}
          remote_user: ${{ vars.REMOTE_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Issue certificates
        if: ${{ inputs.issue_certificates }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ vars.REMOTE_PATH }}
            make certbot-issue

      - name: Restart stack
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ vars.REMOTE_PATH }}
            make run
