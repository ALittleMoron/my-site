name: Nginx Docker image security

on:
  workflow_call:

jobs:
  nginx-docker-image-security:
    name: Nginx Docker image security
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_NAME: my_site_nginx
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./infra/nginx/Dockerfile
          load: true
          cache-from: type=gha,scope=my_site_nginx
          cache-to: type=gha,scope=my_site_nginx,mode=max,ignore-error=true
          tags: my_site_nginx:${{ env.IMAGE_TAG }}

      - name: Lint Docker image
        run: make lint-docker-images DOCKLE_IMAGE_REFS="${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: my_site_nginx:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          hide-progress: true
