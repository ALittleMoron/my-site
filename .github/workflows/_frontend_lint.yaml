name: Frontend lint

on:
  workflow_call:

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - name: "Set up Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: "Lint"
        run: make -C frontend lint
