services:
  postgres-test:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-my_site_database_test}
    ports:
      - "${DB_PORT:-55433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-my_site_database_test}"]
      interval: 2s
      timeout: 10s
      retries: 30
