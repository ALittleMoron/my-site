<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ALM</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="База знаний: статьи, матрица компетенций и инженерный разбор устройства сайта."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Мой сайт" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script nonce="__CSP_NONCE__">
      (() => {
        try {
          const theme = window.localStorage.getItem('chosenTheme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.setAttribute('data-bs-theme', theme);
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <app-root ngCspNonce="__CSP_NONCE__"></app-root>
  </body>
</html>
