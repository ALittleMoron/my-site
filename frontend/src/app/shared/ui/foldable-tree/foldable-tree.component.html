@if (sections().length === 0) {
  <p class="text-body-secondary small mb-0">{{ emptyMessage() }}</p>
} @else {
  <div class="foldable-tree vstack gap-1" role="tree">
    @for (section of sections(); track section.key) {
      <div class="foldable-tree-section-group">
        <button
          type="button"
          class="btn btn-sm w-100 d-flex justify-content-between align-items-center text-start foldable-tree-section"
          [attr.data-testid]="sectionTestId()"
          role="treeitem"
          (click)="toggleSection(section.key)"
          [attr.aria-expanded]="isExpanded(section.key)"
          aria-selected="false"
          [attr.title]="conditionalTitleFor('section', section.key)"
          (mouseenter)="showConditionalTitle('section', section.key, section.label, sectionLabel)"
          (focus)="showConditionalTitle('section', section.key, section.label, sectionLabel)"
          (mouseleave)="clearConditionalTitle('section', section.key)"
          (blur)="clearConditionalTitle('section', section.key)"
        >
          <span class="d-inline-flex align-items-center gap-2 min-w-0">
            <span class="foldable-tree-toggle" aria-hidden="true">
              {{ isExpanded(section.key) ? '-' : '+' }}
            </span>
            <span #sectionLabel class="text-truncate">{{ section.label }}</span>
          </span>
          @if (section.trailingText !== null) {
            <span class="badge rounded-pill text-bg-secondary">{{ section.trailingText }}</span>
          }
        </button>
        @if (isExpanded(section.key)) {
          <div class="foldable-tree-items mt-1" role="group">
            @for (item of section.items; track item.key) {
              <button
                type="button"
                class="foldable-tree-item btn btn-sm w-100 text-start"
                [attr.data-testid]="itemTestId()"
                role="treeitem"
                [class.active]="selectedItemKey() === item.key"
                [attr.aria-selected]="selectedItemKey() === item.key"
                [attr.title]="conditionalTitleFor('item', item.key)"
                (mouseenter)="showConditionalTitle('item', item.key, item.label, itemLabel)"
                (focus)="showConditionalTitle('item', item.key, item.label, itemLabel)"
                (mouseleave)="clearConditionalTitle('item', item.key)"
                (blur)="clearConditionalTitle('item', item.key)"
                (click)="itemSelected.emit(item.key)"
              >
                <span class="foldable-tree-connector" aria-hidden="true">+--</span>
                <span #itemLabel class="foldable-tree-item-label text-truncate">{{
                  item.label
                }}</span>
                @if (item.badgeText !== null) {
                  <span class="badge text-bg-warning ms-2">{{ item.badgeText }}</span>
                }
              </button>
            }
          </div>
        }
      </div>
    }
  </div>
}
