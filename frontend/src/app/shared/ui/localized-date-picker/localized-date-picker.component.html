<div class="localized-date-picker">
  <div class="input-group">
    <input
      [id]="inputId()"
      type="text"
      class="form-control"
      inputmode="numeric"
      autocomplete="off"
      [attr.placeholder]="placeholder()"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.aria-invalid]="invalid() ? 'true' : null"
      [required]="required()"
      [class.is-invalid]="invalid()"
      [value]="displayValue()"
      (input)="onTextInput($event)"
      (blur)="onTextBlur()"
    />
    <button
      type="button"
      class="btn btn-outline-secondary localized-date-picker-toggle"
      data-testid="date-picker-toggle"
      [attr.aria-label]="openCalendarLabel()"
      [attr.aria-controls]="calendarId"
      [attr.aria-expanded]="calendarOpen()"
      (click)="toggleCalendar()"
    >
      <svg
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M8 2v4"></path>
        <path d="M16 2v4"></path>
        <rect width="18" height="18" x="3" y="4" rx="2"></rect>
        <path d="M3 10h18"></path>
      </svg>
    </button>
  </div>

  @if (calendarOpen()) {
    <div
      [id]="calendarId"
      class="localized-date-picker-calendar border rounded bg-body shadow-sm p-2"
      data-testid="date-picker-calendar"
    >
      <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary localized-date-picker-nav"
          [attr.aria-label]="previousMonthLabel()"
          (click)="showPreviousMonth()"
        >
          ‹
        </button>
        <button
          type="button"
          class="btn btn-sm btn-link localized-date-picker-month-year-toggle text-capitalize"
          data-testid="date-picker-month-year-toggle"
          [attr.aria-label]="openMonthYearPickerLabel()"
          [attr.aria-controls]="monthYearPanelId"
          [attr.aria-expanded]="calendarMode() === 'monthYear'"
          (click)="toggleMonthYearPicker()"
        >
          {{ monthLabel() }}
        </button>
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary localized-date-picker-nav"
          [attr.aria-label]="nextMonthLabel()"
          (click)="showNextMonth()"
        >
          ›
        </button>
      </div>

      @if (calendarMode() === 'days') {
        <div class="localized-date-picker-grid localized-date-picker-weekdays mb-1">
          @for (weekday of weekdayLabels(); track weekday) {
            <div class="text-body-secondary small text-center">{{ weekday }}</div>
          }
        </div>
        <div class="localized-date-picker-grid">
          @for (cell of calendarCells(); track $index) {
            @if (cell) {
              <button
                type="button"
                class="btn btn-sm localized-date-picker-day"
                [class.btn-success]="cell.selected"
                [class.btn-outline-secondary]="!cell.selected"
                [class.localized-date-picker-today]="cell.today"
                [attr.aria-label]="cell.ariaLabel"
                [attr.aria-pressed]="cell.selected"
                [attr.data-date]="cell.iso"
                (click)="selectDate(cell.iso)"
              >
                {{ cell.label }}
              </button>
            } @else {
              <span aria-hidden="true"></span>
            }
          }
        </div>
      } @else {
        <div
          [id]="monthYearPanelId"
          class="localized-date-picker-month-year-panel"
          data-testid="date-picker-month-year-panel"
        >
          <div class="localized-date-picker-year-row d-flex align-items-center gap-2 mb-2">
            <button
              type="button"
              class="btn btn-sm btn-outline-secondary localized-date-picker-nav"
              data-testid="date-picker-previous-year"
              [attr.aria-label]="previousYearLabel()"
              (click)="showPreviousYear()"
            >
              ‹
            </button>
            <div class="small fw-semibold text-center flex-grow-1">{{ visibleYearLabel() }}</div>
            <button
              type="button"
              class="btn btn-sm btn-outline-secondary localized-date-picker-nav"
              data-testid="date-picker-next-year"
              [attr.aria-label]="nextYearLabel()"
              (click)="showNextYear()"
            >
              ›
            </button>
          </div>
          <div class="localized-date-picker-month-grid">
            @for (month of monthOptions(); track month.index) {
              <button
                type="button"
                class="btn btn-sm localized-date-picker-month text-capitalize"
                [class.btn-success]="month.selected"
                [class.btn-outline-secondary]="!month.selected"
                [attr.aria-label]="month.ariaLabel"
                [attr.aria-pressed]="month.selected"
                [attr.data-month-index]="month.index"
                (click)="selectMonth(month.index)"
              >
                {{ month.label }}
              </button>
            }
          </div>
        </div>
      }
    </div>
  }
</div>
