<div class="articles-panel-header d-flex justify-content-between align-items-center mb-3">
  <h2 class="h6 mb-0">{{ 'articles.folders' | t }}</h2>
  <button
    type="button"
    class="btn-close d-lg-none"
    [attr.aria-label]="'shared.close' | t"
    (click)="closePanel.emit()"
  ></button>
</div>

<app-foldable-tree
  [sections]="sections()"
  [emptyMessage]="'articles.emptyTree' | t"
  [selectedItemKey]="currentSlug()"
  [defaultExpandedSectionKeys]="defaultExpandedSectionKeys"
  sectionTestId="articles-tree-folder"
  itemTestId="articles-tree-article"
  (itemSelected)="articleSelected.emit($event)"
/>
