<div class="list-group list-group-flush">
  @for (article of articles(); track article.slug) {
    <article class="list-group-item px-3 px-md-4 py-3">
      <div class="d-flex justify-content-between gap-3 align-items-start">
        <div class="min-w-0">
          <button
            type="button"
            class="btn btn-link p-0 fw-semibold text-start text-decoration-none articles-title-button"
            (click)="articleSelected.emit(article.slug)"
          >
            {{ article.title }}
          </button>
          <p class="text-body-secondary small mb-2 mt-1">{{ article.excerpt }}</p>
          <div class="d-flex flex-wrap gap-2">
            @for (tag of article.tags; track tag.id) {
              <button
                type="button"
                class="btn btn-sm btn-outline-secondary py-0"
                (click)="tagSelected.emit(tag.slug)"
              >
                {{ tag.name }}
              </button>
            }
          </div>
        </div>
        <div class="text-end small text-body-secondary flex-shrink-0">
          <div>{{ articleDate(article) }}</div>
          <div>{{ article.authorUsername }}</div>
          <div>{{ 'articles.views' | t: { count: article.viewCount } }}</div>
        </div>
      </div>
    </article>
  }
</div>

@if (totalPages() > 1) {
  <nav
    class="d-flex justify-content-between align-items-center pt-4"
    [attr.aria-label]="'articles.pagination' | t"
  >
    <button
      type="button"
      class="btn btn-outline-secondary btn-sm"
      [disabled]="!hasPrevious()"
      (click)="previousPage()"
    >
      {{ 'shared.back' | t }}
    </button>
    <span class="small text-body-secondary">{{ page() }} / {{ totalPages() }}</span>
    <button
      type="button"
      class="btn btn-outline-secondary btn-sm"
      [disabled]="!hasNext()"
      (click)="nextPage()"
    >
      {{ 'shared.next' | t }}
    </button>
  </nav>
}
