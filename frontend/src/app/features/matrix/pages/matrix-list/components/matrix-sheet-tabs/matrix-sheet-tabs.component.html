<div class="d-flex gap-2 flex-wrap mb-4" role="tablist" aria-label="Competency matrix sheets">
  @for (sheet of sheets(); track sheet) {
    <button
      type="button"
      role="tab"
      class="btn btn-sm rounded rounded-3"
      [class.button-active]="isSelected(sheet)"
      [class.button-inactive]="!isSelected(sheet)"
      [attr.aria-selected]="isSelected(sheet)"
      (click)="selectSheet(sheet)"
    >
      {{ sheet }}
    </button>
  }
</div>
