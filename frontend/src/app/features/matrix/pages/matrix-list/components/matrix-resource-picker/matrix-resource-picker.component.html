<section class="mt-3">
  <h3 class="h6">{{ 'matrix.resources.title' | t }}</h3>

  <div class="input-group input-group-sm mb-2">
    <input
      type="search"
      class="form-control"
      [placeholder]="'matrix.resources.searchPlaceholder' | t"
      [ngModel]="search()"
      (ngModelChange)="setSearch($event)"
    />
  </div>

  @if (searchResults().length > 0) {
    <div class="list-group mb-3">
      @for (resource of searchResults(); track resource.id) {
        <button
          type="button"
          class="list-group-item list-group-item-action"
          (click)="attach(resource)"
        >
          <span class="d-block fw-semibold">{{ resource.name }}</span>
          <span class="small text-muted">{{ resource.url }}</span>
        </button>
      }
    </div>
  }

  <div class="row g-2 mb-3">
    <div class="col-md-4">
      <input
        type="text"
        class="form-control form-control-sm"
        [placeholder]="'matrix.resources.newNameRuPlaceholder' | t"
        [ngModel]="newNameRu()"
        (ngModelChange)="newNameRu.set($event)"
      />
    </div>
    <div class="col-md-4">
      <input
        type="text"
        class="form-control form-control-sm"
        [placeholder]="'matrix.resources.newNameEnPlaceholder' | t"
        [ngModel]="newNameEn()"
        (ngModelChange)="newNameEn.set($event)"
      />
    </div>
    <div class="col-md-3">
      <input
        type="url"
        class="form-control form-control-sm"
        placeholder="URL"
        [ngModel]="newUrl()"
        (ngModelChange)="newUrl.set($event)"
      />
    </div>
    <div class="col-md-1 d-grid">
      <button type="button" class="btn btn-sm btn-outline-primary" (click)="addNew()">
        {{ 'shared.add' | t }}
      </button>
    </div>
  </div>

  @for (resource of resources(); track resource.id; let index = $index) {
    <div class="border rounded p-2 mb-2">
      <div class="d-flex justify-content-between gap-2">
        <div>
          <div class="fw-semibold">{{ resource.name }}</div>
          <div class="small text-muted">{{ resource.url }}</div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-danger" (click)="detach(index)">
          {{ 'matrix.resources.detach' | t }}
        </button>
      </div>
      <div class="row g-2 mt-2">
        <div class="col-md-6">
          <textarea
            class="form-control form-control-sm"
            rows="2"
            [placeholder]="'matrix.resources.contextRuPlaceholder' | t"
            [ngModel]="resource.translations.ru.context"
            (ngModelChange)="updateContext(index, 'ru', $event)"
          ></textarea>
        </div>
        <div class="col-md-6">
          <textarea
            class="form-control form-control-sm"
            rows="2"
            [placeholder]="'matrix.resources.contextEnPlaceholder' | t"
            [ngModel]="resource.translations.en.context"
            (ngModelChange)="updateContext(index, 'en', $event)"
          ></textarea>
        </div>
      </div>
    </div>
  }
</section>
