<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="mb-3">
    <label class="form-label" for="matrixQuestion">{{ 'matrix.form.question' | t }}</label>
    <input id="matrixQuestion" type="text" class="form-control" formControlName="question" />
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label" for="matrixSheet">{{ 'matrix.form.sheet' | t }}</label>
      <input id="matrixSheet" type="text" class="form-control" formControlName="sheet" />
    </div>
    <div class="col-md-6">
      <label class="form-label" for="matrixGrade">{{ 'matrix.form.grade' | t }}</label>
      <select id="matrixGrade" class="form-select" formControlName="grade">
        <option value="Junior">{{ 'enum.grade.Junior' | t }}</option>
        <option value="Junior+">{{ 'enum.grade.JuniorPlus' | t }}</option>
        <option value="Middle">{{ 'enum.grade.Middle' | t }}</option>
        <option value="Middle+">{{ 'enum.grade.MiddlePlus' | t }}</option>
        <option value="Senior">{{ 'enum.grade.Senior' | t }}</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label" for="matrixSection">{{ 'matrix.form.section' | t }}</label>
      <input id="matrixSection" type="text" class="form-control" formControlName="section" />
    </div>
    <div class="col-md-6">
      <label class="form-label" for="matrixSubsection">{{ 'matrix.form.subsection' | t }}</label>
      <input id="matrixSubsection" type="text" class="form-control" formControlName="subsection" />
    </div>
  </div>

  <div class="form-check form-switch my-3">
    <input
      id="matrixPublishStatus"
      class="form-check-input"
      type="checkbox"
      [checked]="form.controls.publishStatus.value === 'Draft'"
      (change)="
        form.controls.publishStatus.setValue($any($event.target).checked ? 'Draft' : 'Published')
      "
    />
    <label class="form-check-label" for="matrixPublishStatus">{{ 'matrix.form.draft' | t }}</label>
  </div>

  <div class="mb-3">
    <div class="form-label">{{ 'matrix.form.answer' | t }}</div>
    <app-markdown-editor [value]="form.controls.answer.value" (valueChange)="setAnswer($event)" />
  </div>

  <div class="mb-3">
    <div class="form-label">{{ 'matrix.form.expectedAnswer' | t }}</div>
    <app-markdown-editor
      [value]="form.controls.interviewExpectedAnswer.value"
      (valueChange)="setInterviewExpectedAnswer($event)"
    />
  </div>

  <app-matrix-resource-picker
    [resources]="resources()"
    [searchResults]="searchResults()"
    (searchChange)="resourceSearch.emit($event)"
    (resourcesChange)="resources.set($event)"
  />

  <div class="d-flex justify-content-end gap-2 mt-4">
    <button type="button" class="btn btn-outline-secondary" (click)="formCancel.emit()">
      {{ 'shared.cancel' | t }}
    </button>
    <button type="submit" class="btn btn-primary">{{ 'shared.save' | t }}</button>
  </div>
</form>
