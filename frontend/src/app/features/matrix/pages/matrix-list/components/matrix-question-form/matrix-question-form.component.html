<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="mb-3">
    <label class="form-label" for="matrixQuestion">Вопрос</label>
    <input id="matrixQuestion" type="text" class="form-control" formControlName="question" />
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label" for="matrixSheet">Лист</label>
      <input id="matrixSheet" type="text" class="form-control" formControlName="sheet" />
    </div>
    <div class="col-md-6">
      <label class="form-label" for="matrixGrade">Грейд</label>
      <select id="matrixGrade" class="form-select" formControlName="grade">
        <option value="Junior">Junior</option>
        <option value="Junior+">Junior+</option>
        <option value="Middle">Middle</option>
        <option value="Middle+">Middle+</option>
        <option value="Senior">Senior</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label" for="matrixSection">Раздел</label>
      <input id="matrixSection" type="text" class="form-control" formControlName="section" />
    </div>
    <div class="col-md-6">
      <label class="form-label" for="matrixSubsection">Подраздел</label>
      <input id="matrixSubsection" type="text" class="form-control" formControlName="subsection" />
    </div>
  </div>

  <div class="form-check form-switch my-3">
    <input
      id="matrixPublishStatus"
      class="form-check-input"
      type="checkbox"
      [checked]="form.controls.publishStatus.value === 'Draft'"
      (change)="form.controls.publishStatus.setValue($any($event.target).checked ? 'Draft' : 'Published')"
    />
    <label class="form-check-label" for="matrixPublishStatus">Черновик</label>
  </div>

  <div class="mb-3">
    <div class="form-label">Ответ</div>
    <app-markdown-editor
      [value]="form.controls.answer.value"
      (valueChange)="setAnswer($event)"
    />
  </div>

  <div class="mb-3">
    <div class="form-label">Ожидаемый ответ на собеседовании</div>
    <app-markdown-editor
      [value]="form.controls.interviewExpectedAnswer.value"
      (valueChange)="setInterviewExpectedAnswer($event)"
    />
  </div>

  <app-matrix-resource-picker
    [resources]="resources()"
    [searchResults]="searchResults()"
    (searchChange)="resourceSearch.emit($event)"
    (resourcesChange)="resources.set($event)"
  />

  <div class="d-flex justify-content-end gap-2 mt-4">
    <button type="button" class="btn btn-outline-secondary" (click)="formCancel.emit()">Отмена</button>
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>
