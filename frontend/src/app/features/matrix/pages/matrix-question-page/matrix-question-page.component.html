<main class="container py-4">
  @if (matrixOverviewLink()) {
    <a class="btn btn-sm btn-outline-secondary mb-3" [routerLink]="matrixOverviewLink()">
      {{ 'matrix.question.backToMatrix' | t }}
    </a>
  }

  @if (language()) {
    <app-matrix-question-detail
      [question]="question()"
      [loading]="loading()"
      [error]="error()"
      [isAdmin]="false"
      [language]="language()!"
    />
  }
</main>
