        <span class="text-body-secondary small" [attr.aria-label]="'Logged in as ' + username()">
          {{ username() }}
        </span>
        <button
          type="button"
          class="btn btn-outline-danger btn-sm"
          (click)="logout()"
          aria-label="Выйти"
        >
          Выйти
        </button>

        <button
          type="button"
          class="btn button-inactive btn-sm"

          aria-label="Войти"
