<nav
  class="navbar navbar-expand-lg nav nav-pills nav-blur fixed-top px-2 px-sm-3 px-lg-4 py-1 border-bottom"
>
  <div class="container-fluid px-0 gap-2">
    <a
      class="navbar-brand fs-4 text-success fw-bold"
      [routerLink]="homeLink()"
      (click)="closeNav()"
    >
      ALM
    </a>
    <button
      class="navbar-toggler flex-shrink-0"
      type="button"
      (click)="toggleNav()"
      aria-controls="navbarContent"
      [attr.aria-expanded]="isNavOpen()"
      [attr.aria-label]="'shell.nav.toggleNavigation' | t"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="navbar-collapse w-100" [class.collapse]="!isNavOpen()" id="navbarContent">
      <div class="d-lg-flex align-items-lg-center justify-content-lg-between w-100 pt-3 pt-lg-0">
        <ul
          class="navbar-nav d-flex flex-column flex-lg-row justify-content-lg-center flex-lg-grow-1 gap-1 gap-lg-0 mb-3 mb-lg-0"
          data-testid="site-header-nav-list"
        >
          <li class="nav-item mx-lg-3">
            <a
              class="nav-link link-colored"
              [routerLink]="matrixLink()"
              routerLinkActive="link-active"
              [attr.aria-label]="'shell.nav.matrix' | t"
              (click)="closeNav()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="currentColor"
                class="bi bi-mortarboard me-1"
                viewBox="0 0 16 16"
              >
                <path
                  d="M8.211 2.047a.5.5 0 0 0-.422 0l-7.5 3.5a.5.5 0 0 0 .025.917l7.5 3a.5.5 0 0 0 .372 0L14 7.14V13a1 1 0 0 0-1 1v2h3v-2a1 1 0 0 0-1-1V6.739l.686-.275a.5.5 0 0 0 .025-.917zM8 8.46 1.758 5.965 8 3.052l6.242 2.913z"
                />
                <path
                  d="M4.176 9.032a.5.5 0 0 0-.656.327l-.5 1.7a.5.5 0 0 0 .294.605l4.5 1.8a.5.5 0 0 0 .372 0l4.5-1.8a.5.5 0 0 0 .294-.605l-.5-1.7a.5.5 0 0 0-.656-.327L8 10.466zm-.068 1.873.22-.748 3.496 1.311a.5.5 0 0 0 .352 0l3.496-1.311.22.748L8 12.46z"
                />
              </svg>
              <span>{{ 'shell.nav.matrix' | t }}</span>
            </a>
          </li>
          <li class="nav-item mx-lg-3">
            <a
              class="nav-link link-colored"
              [routerLink]="articlesLink()"
              routerLinkActive="link-active"
              [attr.aria-label]="'shell.nav.articles' | t"
              (click)="closeNav()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="me-1"
              >
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>
              </svg>
              <span>{{ 'shell.nav.articles' | t }}</span>
            </a>
          </li>
          @if (canManageContent()) {
            <li class="nav-item mx-lg-3">
              <a
                class="nav-link link-colored"
                [routerLink]="adminPanelLink()"
                routerLinkActive="link-active"
                [attr.aria-label]="'shell.nav.adminPanel' | t"
                (click)="closeNav()"
              >
                <svg
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="me-1"
                >
                  <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7"></path>
                  <path d="M18 8V5a2 2 0 0 0-2-2h-1"></path>
                  <path d="M18 16v3a2 2 0 0 1-2 2h-1"></path>
                  <path d="M15 12h6"></path>
                  <path d="m18 9 3 3-3 3"></path>
                </svg>
                <span>{{ 'shell.nav.adminPanel' | t }}</span>
              </a>
            </li>
          }
        </ul>

        <div
          class="d-flex align-items-center justify-content-start justify-content-lg-end gap-2 flex-wrap"
          data-testid="site-header-actions"
        >
          <button
            type="button"
            class="btn button-inactive btn-sm flex-shrink-0"
            (click)="toggle()"
            [attr.title]="'shell.theme.toggle' | t"
          >
            {{ toggleLabel() }}
          </button>

          <div
            class="btn-group btn-group-sm flex-shrink-0"
            role="group"
            [attr.aria-label]="'shell.language.label' | t"
          >
            @for (language of languageOptions(); track language.code) {
              <button
                type="button"
                class="btn"
                [class.button-active]="language.selected"
                [class.button-inactive]="!language.selected"
                [attr.aria-pressed]="language.selected"
                [attr.title]="language.label"
                (click)="switchLanguage(language.code)"
              >
                {{ language.shortLabel }}
              </button>
            }
          </div>

          @if (isLoggedIn()) {
            <span
              class="text-body-secondary small text-break"
              [attr.aria-label]="'shell.auth.loggedInAs' | t: { username: username() ?? '' }"
            >
              {{ username() }}
            </span>
            <span class="text-body-secondary small" aria-hidden="true">|</span>
            <button
              type="button"
              class="btn btn-link btn-sm link-danger p-0 text-decoration-none text-nowrap"
              (click)="logout()"
              [attr.aria-label]="'shell.auth.logout' | t"
            >
              {{ 'shell.auth.logout' | t }}
            </button>
          } @else {
            <button
              type="button"
              class="btn button-inactive btn-sm text-nowrap flex-shrink-0"
              (click)="openLogin()"
              [attr.aria-label]="'shell.auth.login' | t"
            >
              {{ 'shell.auth.login' | t }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
</nav>
