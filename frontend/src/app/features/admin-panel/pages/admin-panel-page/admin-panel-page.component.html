<app-admin-panel-header />

<main class="admin-panel-main container-fluid py-4">
  <div class="d-flex align-items-center gap-2 mb-3 d-lg-none">
    <button
      type="button"
      class="btn btn-outline-secondary admin-panel-icon-toggle"
      data-testid="admin-panel-side-panel-toggle"
      [attr.aria-label]="sidePanelToggleLabel()"
      [attr.aria-expanded]="sidePanelOpen()"
      [title]="sidePanelToggleLabel()"
      (click)="toggleSidePanel()"
    >
      @if (sidePanelOpen()) {
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6"></path>
          <path d="M20 4v16"></path>
        </svg>
      } @else {
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m9 18 6-6-6-6"></path>
          <path d="M4 4v16"></path>
        </svg>
      }
    </button>
    <h1 class="h5 mb-0">{{ 'adminPanel.title' | t }}</h1>
  </div>

  <div class="admin-panel-layout">
    <aside
      class="admin-panel-side-panel border-end pe-lg-3"
      data-testid="admin-panel-side-panel"
      [class.admin-panel-side-panel-open]="sidePanelOpen()"
      [class.admin-panel-side-panel-closed]="!sidePanelOpen()"
    >
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h6 mb-0">{{ 'adminPanel.sections' | t }}</h2>
        <button
          type="button"
          class="btn-close d-lg-none"
          [attr.aria-label]="'shared.close' | t"
          (click)="closeSidePanel()"
        ></button>
      </div>
      <app-foldable-tree
        [sections]="sections()"
        [emptyMessage]="'adminPanel.emptySections' | t"
        [selectedItemKey]="selectedPageKey()"
        [defaultExpandedSectionKeys]="defaultExpandedSectionKeys()"
        sectionTestId="admin-panel-tree-section"
        itemTestId="admin-panel-tree-item"
        (itemSelected)="selectPage($event)"
      />
    </aside>
    @if (sidePanelOpen()) {
      <button
        type="button"
        class="admin-panel-mobile-backdrop d-lg-none"
        [attr.aria-label]="'shared.close' | t"
        (click)="closeSidePanel()"
      ></button>
    }

    <section class="admin-panel-content">
      <router-outlet />
    </section>
  </div>
</main>
