<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
  <h2 class="h4 mb-0">{{ 'articles.stats.button' | t }}</h2>
</div>

<app-admin-article-statistics-panel
  [stats]="stats()"
  [loading]="loading()"
  [error]="error()"
  [dateFrom]="dateFrom()"
  [dateTo]="dateTo()"
  [dateLocale]="dateLocale()"
  [datePickerLabels]="datePickerLabels()"
  (dateFromChange)="setDateFrom($event)"
  (dateToChange)="setDateTo($event)"
  (refresh)="loadStats()"
  (exportCsv)="exportStatsCsv()"
/>
