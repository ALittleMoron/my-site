<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
  <h2 class="h4 mb-0">{{ 'adminMatrixQueue.title' | t }}</h2>
  <div class="d-flex flex-wrap gap-2">
    <button
      type="button"
      class="btn btn-outline-success btn-sm"
      data-testid="matrix-queue-open-manual-add"
      (click)="openManualAdd()"
    >
      {{ 'adminMatrixQueue.addToQueue' | t }}
    </button>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="loadQueue()">
      {{ 'shared.update' | t }}
    </button>
  </div>
</div>

@if (loading()) {
  <app-loading-spinner [ariaLabel]="'shared.loading' | t" />
} @else if (error()) {
  <app-error-message [error]="error()!" [retryLabel]="'shared.retry' | t" (retry)="loadQueue()" />
} @else if (!hasQuestions()) {
  <app-empty-state [message]="'adminMatrixQueue.empty' | t" />
} @else {
  <div class="row g-4">
    <div class="col-12 col-xl-5">
      <div class="list-group">
        @for (question of questions(); track question.id) {
          <button
            type="button"
            class="list-group-item list-group-item-action"
            [class.list-group-item-success]="selectedQuestion()?.id === question.id"
            [attr.aria-current]="selectedQuestion()?.id === question.id ? 'true' : null"
            [attr.data-testid]="'matrix-queue-question-' + question.id"
            (click)="selectQuestion(question)"
          >
            <span class="d-block fw-semibold">{{ question.question }}</span>
            <span class="d-block small">
              {{ 'adminMatrixQueue.createdAt' | t }}: {{ question.createdAt }}
            </span>
            <span class="d-block small">
              {{ 'adminMatrixQueue.suggestedBy' | t }}:
              {{ question.suggestedByUsername ?? ('shared.notSet' | t) }}
            </span>
            @if (questionStructure(question)) {
              <span class="d-block small">
                {{ 'adminMatrixQueue.structure' | t }}: {{ questionStructure(question) }}
              </span>
            }
          </button>
          <button
            type="button"
            class="btn btn-outline-danger btn-sm mt-2 mb-3"
            [disabled]="rejectingQuestionId() === question.id"
            (click)="rejectQuestion(question)"
          >
            {{ 'adminMatrixQueue.reject' | t }}
          </button>
        }
      </div>
    </div>

    <div class="col-12 col-xl-7">
      @if (selectedQuestion()) {
        <form class="row g-3" [formGroup]="form" (ngSubmit)="createQuestion()">
          <div class="col-12">
            <label class="form-label" for="queue-question-slug">{{ 'matrix.form.slug' | t }}</label>
            <input id="queue-question-slug" class="form-control" formControlName="slug" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-question-sheet-key">
              {{ 'matrix.form.sheetKey' | t }}
            </label>
            <input id="queue-question-sheet-key" class="form-control" formControlName="sheetKey" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-question-grade">
              {{ 'matrix.form.grade' | t }}
            </label>
            <select id="queue-question-grade" class="form-select" formControlName="grade">
              @for (grade of grades; track grade) {
                <option [ngValue]="grade">{{ i18n.enumGradeKey(grade) | t }}</option>
              }
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-question-ru">
              {{ 'matrix.form.questionRu' | t }}
            </label>
            <input id="queue-question-ru" class="form-control" formControlName="questionRu" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-question-en">
              {{ 'matrix.form.questionEn' | t }}
            </label>
            <input id="queue-question-en" class="form-control" formControlName="questionEn" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-sheet-ru">{{ 'matrix.form.sheetRu' | t }}</label>
            <input id="queue-sheet-ru" class="form-control" formControlName="sheetRu" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-sheet-en">{{ 'matrix.form.sheetEn' | t }}</label>
            <input id="queue-sheet-en" class="form-control" formControlName="sheetEn" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-section-ru">
              {{ 'matrix.form.sectionRu' | t }}
            </label>
            <input id="queue-section-ru" class="form-control" formControlName="sectionRu" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-section-en">
              {{ 'matrix.form.sectionEn' | t }}
            </label>
            <input id="queue-section-en" class="form-control" formControlName="sectionEn" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-subsection-ru">
              {{ 'matrix.form.subsectionRu' | t }}
            </label>
            <input id="queue-subsection-ru" class="form-control" formControlName="subsectionRu" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-subsection-en">
              {{ 'matrix.form.subsectionEn' | t }}
            </label>
            <input id="queue-subsection-en" class="form-control" formControlName="subsectionEn" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-answer-ru">
              {{ 'matrix.form.answerRu' | t }}
            </label>
            <textarea id="queue-answer-ru" class="form-control" rows="4" formControlName="answerRu">
            </textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-answer-en">
              {{ 'matrix.form.answerEn' | t }}
            </label>
            <textarea id="queue-answer-en" class="form-control" rows="4" formControlName="answerEn">
            </textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-expected-answer-ru">
              {{ 'matrix.form.expectedAnswerRu' | t }}
            </label>
            <textarea
              id="queue-expected-answer-ru"
              class="form-control"
              rows="4"
              formControlName="expectedAnswerRu"
            ></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="queue-expected-answer-en">
              {{ 'matrix.form.expectedAnswerEn' | t }}
            </label>
            <textarea
              id="queue-expected-answer-en"
              class="form-control"
              rows="4"
              formControlName="expectedAnswerEn"
            ></textarea>
          </div>
          <div class="col-12 d-flex justify-content-end">
            <button type="submit" class="btn btn-success" [disabled]="submitting()">
              {{ 'adminMatrixQueue.create' | t }}
            </button>
          </div>
        </form>
      } @else {
        <app-empty-state [message]="'shared.empty' | t" />
      }
    </div>
  </div>
}

@if (manualAddVisible()) {
  <div
    class="modal d-block bg-dark bg-opacity-50"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'adminMatrixQueue.addManualTitle' | t"
    (click)="closeManualAdd()"
    (keyup.escape)="closeManualAdd()"
    tabindex="0"
  >
    <div
      class="modal-dialog modal-dialog-centered"
      role="document"
      tabindex="-1"
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
    >
      <form class="modal-content" (submit)="$event.preventDefault(); createQueuedQuestion()">
        <div class="modal-header">
          <h5 class="modal-title">{{ 'adminMatrixQueue.addManualTitle' | t }}</h5>
          <button
            type="button"
            class="btn-close"
            [disabled]="manualAddSubmitting()"
            [attr.aria-label]="'shared.close' | t"
            (click)="closeManualAdd()"
          ></button>
        </div>
        <div class="modal-body">
          <label class="form-label" for="matrix-queue-manual-question">
            {{ 'matrix.suggestion.question' | t }}
          </label>
          <input
            type="text"
            id="matrix-queue-manual-question"
            class="form-control"
            maxlength="255"
            [placeholder]="'adminMatrixQueue.addManualPlaceholder' | t"
            [value]="manualAddQuestion()"
            [disabled]="manualAddSubmitting()"
            (input)="onManualAddQuestionInput($event)"
            (paste)="onManualAddQuestionPaste($event)"
          />
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline-secondary"
            [disabled]="manualAddSubmitting()"
            (click)="closeManualAdd()"
          >
            {{ 'shared.cancel' | t }}
          </button>
          <button
            type="submit"
            class="btn btn-success"
            data-testid="matrix-queue-manual-submit"
            [disabled]="!canSubmitManualAdd() || manualAddSubmitting()"
          >
            @if (manualAddSubmitting()) {
              {{ 'adminMatrixQueue.addManualSubmitting' | t }}
            } @else {
              {{ 'adminMatrixQueue.addToQueue' | t }}
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
