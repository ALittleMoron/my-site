<nav class="navbar nav-blur fixed-top px-4 py-1 border-bottom">
  <div class="container-fluid px-0 gap-3 admin-panel-header-inner">
    <div
      class="d-flex align-items-center gap-2 flex-shrink-0"
      data-testid="admin-panel-header-primary"
    >
      <a
        class="btn btn-outline-secondary btn-sm admin-panel-back-link"
        data-testid="admin-panel-home-link"
        [routerLink]="homeLink()"
        [attr.aria-label]="'adminPanel.header.backToHome' | t"
        [attr.title]="'adminPanel.header.backToHome' | t"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m12 19-7-7 7-7"></path>
          <path d="M19 12H5"></path>
        </svg>
      </a>
      <span
        class="navbar-brand fs-4 text-success fw-bold mb-0 me-0 admin-panel-title"
        data-testid="admin-panel-header-title"
      >
        {{ 'adminPanel.title' | t }}
      </span>
    </div>

    <div class="d-flex align-items-center justify-content-end gap-2 admin-panel-header-controls">
      <button
        type="button"
        class="btn button-inactive btn-sm"
        (click)="toggleTheme()"
        [attr.aria-label]="'shell.theme.toggle' | t"
      >
        {{ toggleLabel() }}
      </button>

      <div
        class="btn-group btn-group-sm"
        role="group"
        [attr.aria-label]="'shell.language.label' | t"
      >
        @for (language of languageOptions(); track language.code) {
          <button
            type="button"
            class="btn"
            [class.button-active]="language.selected"
            [class.button-inactive]="!language.selected"
            [attr.aria-pressed]="language.selected"
            [attr.title]="language.label"
            (click)="switchLanguage(language.code)"
          >
            {{ language.shortLabel }}
          </button>
        }
      </div>

      @if (isLoggedIn()) {
        <span
          class="text-body-secondary small text-truncate admin-panel-username"
          [attr.aria-label]="'shell.auth.loggedInAs' | t: { username: username() ?? '' }"
        >
          {{ username() }}
        </span>
        <span class="text-body-secondary small" aria-hidden="true">|</span>
        <button
          type="button"
          class="btn btn-link btn-sm link-danger p-0 text-decoration-none text-nowrap"
          (click)="logout()"
          [attr.aria-label]="'shell.auth.logout' | t"
        >
          {{ 'shell.auth.logout' | t }}
        </button>
      } @else {
        <button
          type="button"
          class="btn button-inactive btn-sm text-nowrap"
          (click)="openLogin()"
          [attr.aria-label]="'shell.auth.login' | t"
        >
          {{ 'shell.auth.login' | t }}
        </button>
      }
    </div>
  </div>
</nav>
