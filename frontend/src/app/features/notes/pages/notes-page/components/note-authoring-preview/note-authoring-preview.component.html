<section class="border-top border-bottom py-3 my-3" [attr.aria-label]="'notes.preview.aria' | t">
  <div class="row g-4">
    <article class="col-lg-7 notes-preview-article">
      <h3 class="h6 text-body-secondary">{{ 'notes.preview.article' | t }}</h3>
      @if (coverImageUrl()) {
        <img
          class="notes-preview-cover img-fluid mb-3"
          [src]="coverImageUrl()!"
          [alt]="coverImageAlt() ?? ''"
        />
      }
      <h2 class="h4">{{ title() }}</h2>
      @if (tags().length > 0) {
        <div class="d-flex flex-wrap gap-2 mb-3">
          @for (tag of tags(); track tag.id) {
            <span class="badge text-bg-secondary">{{ tag.name }}</span>
          }
        </div>
      }
      <div class="notes-markdown" [innerHTML]="contentHtml()"></div>
    </article>

    <aside class="col-lg-5">
      <h3 class="h6 text-body-secondary">{{ 'notes.preview.social' | t }}</h3>
      <div class="notes-social-preview border rounded p-3">
        @if (coverImageUrl()) {
          <img class="img-fluid mb-3" [src]="coverImageUrl()!" [alt]="coverImageAlt() ?? ''" />
        }
        <div class="fw-semibold">{{ socialTitle() }}</div>
        @if (socialDescription()) {
          <p class="small text-body-secondary mb-0">{{ socialDescription() }}</p>
        }
      </div>
    </aside>
  </div>
</section>
