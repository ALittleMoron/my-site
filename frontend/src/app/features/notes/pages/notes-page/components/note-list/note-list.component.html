<div class="list-group list-group-flush">
  @for (note of notes(); track note.slug) {
    <article class="list-group-item px-0 py-3">
      <div class="d-flex justify-content-between gap-3 align-items-start">
        <div class="min-w-0">
          <button
            type="button"
            class="btn btn-link p-0 fw-semibold text-start text-decoration-none notes-title-button"
            (click)="noteSelected.emit(note.slug)"
          >
            {{ note.title }}
          </button>
          @if (isAdmin() && note.publishStatus === 'Draft') {
            <span class="badge text-bg-warning ms-2">Черновик</span>
          }
          <p class="text-body-secondary small mb-2 mt-1">{{ note.excerpt }}</p>
          <div class="d-flex flex-wrap gap-2">
            @for (tag of note.tags; track tag.id) {
              <button
                type="button"
                class="btn btn-sm btn-outline-secondary py-0"
                (click)="tagSelected.emit(tag.slug)"
              >
                {{ tag.name }}
              </button>
            }
          </div>
        </div>
        <div class="text-end small text-body-secondary flex-shrink-0">
          <div>{{ noteDate(note) }}</div>
          <div>{{ note.authorUsername }}</div>
        </div>
      </div>
    </article>
  }
</div>

@if (totalPages() > 1) {
  <nav class="d-flex justify-content-between align-items-center pt-4" aria-label="Notes pagination">
    <button
      type="button"
      class="btn btn-outline-secondary btn-sm"
      [disabled]="!hasPrevious()"
      (click)="previousPage()"
    >
      Назад
    </button>
    <span class="small text-body-secondary">{{ page() }} / {{ totalPages() }}</span>
    <button
      type="button"
      class="btn btn-outline-secondary btn-sm"
      [disabled]="!hasNext()"
      (click)="nextPage()"
    >
      Вперёд
    </button>
  </nav>
}
