<div class="notes-panel-header d-flex justify-content-between align-items-center mb-3">
  <h2 class="h6 mb-0">{{ 'notes.folders' | t }}</h2>
  <button
    type="button"
    class="btn-close d-lg-none"
    [attr.aria-label]="'shared.close' | t"
    (click)="closePanel.emit()"
  ></button>
</div>

<app-foldable-tree
  [sections]="sections()"
  [emptyMessage]="'notes.emptyTree' | t"
  [selectedItemKey]="currentSlug()"
  sectionTestId="notes-tree-folder"
  itemTestId="notes-tree-note"
  (itemSelected)="noteSelected.emit($event)"
/>
