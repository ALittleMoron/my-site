<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label" for="noteSlug">{{ 'notes.form.slug' | t }}</label>
      <input
        id="noteSlug"
        type="text"
        class="form-control"
        formControlName="slug"
        (input)="onSlugInput()"
      />
    </div>
    <div class="col-md-8">
      <label class="form-label" for="noteCoverImageUrl">{{ 'notes.form.coverImageUrl' | t }}</label>
      <input
        id="noteCoverImageUrl"
        type="url"
        class="form-control"
        formControlName="coverImageUrl"
      />
    </div>
    <div class="col-md-4">
      <label class="form-label" for="noteCoverImageFile">{{
        'notes.form.coverImageFile' | t
      }}</label>
      <input
        id="noteCoverImageFile"
        type="file"
        class="form-control"
        accept="image/*"
        (change)="uploadCoverImage($event)"
      />
    </div>
  </div>

  <ul class="nav nav-tabs mt-3" role="tablist">
    <li class="nav-item" role="presentation">
      <button
        type="button"
        class="nav-link"
        [class.active]="activeLanguageTab() === 'ru'"
        (click)="setActiveLanguageTab('ru')"
      >
        {{ 'notes.form.languageRu' | t }}
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button
        type="button"
        class="nav-link"
        [class.active]="activeLanguageTab() === 'en'"
        (click)="setActiveLanguageTab('en')"
      >
        {{ 'notes.form.languageEn' | t }}
      </button>
    </li>
  </ul>

  <div class="border border-top-0 rounded-bottom p-3 mb-3">
    <div [class.d-none]="activeLanguageTab() !== 'ru'">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label" for="noteTitleRu">{{ 'notes.form.titleRu' | t }}</label>
          <input id="noteTitleRu" type="text" class="form-control" formControlName="titleRu" />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="noteFolderRu">{{ 'notes.form.folderRu' | t }}</label>
          <input id="noteFolderRu" type="text" class="form-control" formControlName="folderRu" />
        </div>
        <div class="col-md-8">
          <label class="form-label" for="noteSeoTitleRu">{{ 'notes.form.seoTitleRu' | t }}</label>
          <input
            id="noteSeoTitleRu"
            type="text"
            class="form-control"
            formControlName="seoTitleRu"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="noteCoverImageAltRu">
            {{ 'notes.form.coverImageAltRu' | t }}
          </label>
          <input
            id="noteCoverImageAltRu"
            type="text"
            class="form-control"
            formControlName="coverImageAltRu"
          />
        </div>
        <div class="col-12">
          <label class="form-label" for="noteSeoDescriptionRu">
            {{ 'notes.form.seoDescriptionRu' | t }}
          </label>
          <textarea
            id="noteSeoDescriptionRu"
            class="form-control"
            rows="3"
            formControlName="seoDescriptionRu"
          ></textarea>
        </div>
        <div class="col-12">
          <div class="form-label">{{ 'notes.form.contentRu' | t }}</div>
          <app-markdown-editor
            [value]="form.controls.contentRu.value"
            (valueChange)="setContentRu($event)"
          />
        </div>
      </div>
    </div>

    <div [class.d-none]="activeLanguageTab() !== 'en'">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label" for="noteTitleEn">{{ 'notes.form.titleEn' | t }}</label>
          <input
            id="noteTitleEn"
            type="text"
            class="form-control"
            formControlName="titleEn"
            (input)="onTitleEnInput()"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="noteFolderEn">{{ 'notes.form.folderEn' | t }}</label>
          <input id="noteFolderEn" type="text" class="form-control" formControlName="folderEn" />
        </div>
        <div class="col-md-8">
          <label class="form-label" for="noteSeoTitleEn">{{ 'notes.form.seoTitleEn' | t }}</label>
          <input
            id="noteSeoTitleEn"
            type="text"
            class="form-control"
            formControlName="seoTitleEn"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="noteCoverImageAltEn">
            {{ 'notes.form.coverImageAltEn' | t }}
          </label>
          <input
            id="noteCoverImageAltEn"
            type="text"
            class="form-control"
            formControlName="coverImageAltEn"
          />
        </div>
        <div class="col-12">
          <label class="form-label" for="noteSeoDescriptionEn">
            {{ 'notes.form.seoDescriptionEn' | t }}
          </label>
          <textarea
            id="noteSeoDescriptionEn"
            class="form-control"
            rows="3"
            formControlName="seoDescriptionEn"
          ></textarea>
        </div>
        <div class="col-12">
          <div class="form-label">{{ 'notes.form.contentEn' | t }}</div>
          <app-markdown-editor
            [value]="form.controls.contentEn.value"
            (valueChange)="setContentEn($event)"
          />
        </div>
      </div>
    </div>
  </div>

  <div class="form-check form-switch my-3">
    <input
      id="notePublishStatus"
      class="form-check-input"
      type="checkbox"
      [checked]="form.controls.publishStatus.value === 'Draft'"
      (change)="setPublishStatusFromEvent($event)"
    />
    <label class="form-check-label" for="notePublishStatus">{{ 'shared.draft' | t }}</label>
  </div>

  <app-note-seo-panel [analysis]="seoAnalysis()" />

  <app-note-authoring-preview
    [title]="activePreview().title"
    [content]="activePreview().content"
    [tags]="activePreview().tags"
    [coverImageUrl]="activePreview().coverImageUrl"
    [coverImageAlt]="activePreview().coverImageAlt"
    [seoTitle]="activePreview().seoTitle"
    [seoDescription]="activePreview().seoDescription"
    [language]="activePreview().language"
  />

  <div class="border rounded-3 p-3">
    <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
      <h3 class="h6 mb-0">{{ 'notes.form.tags' | t }}</h3>
      @if (tagError()) {
        <span class="text-danger small">{{ tagError() }}</span>
      }
    </div>

    <div class="row g-2 align-items-end mb-3" [formGroup]="newTagForm">
      <div class="col-md-3">
        <label class="form-label small" for="newTagNameRu">{{ 'notes.form.tagNameRu' | t }}</label>
        <input id="newTagNameRu" class="form-control form-control-sm" formControlName="nameRu" />
      </div>
      <div class="col-md-3">
        <label class="form-label small" for="newTagNameEn">{{ 'notes.form.tagNameEn' | t }}</label>
        <input
          id="newTagNameEn"
          class="form-control form-control-sm"
          formControlName="nameEn"
          (input)="onNewTagNameEnInput()"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label small" for="newTagSlug">{{ 'notes.form.slug' | t }}</label>
        <input
          id="newTagSlug"
          class="form-control form-control-sm"
          formControlName="slug"
          (input)="onNewTagSlugInput()"
        />
      </div>
      <div class="col-md-2 d-grid">
        <button type="button" class="btn btn-sm btn-outline-primary" (click)="createTag()">
          {{ 'shared.add' | t }}
        </button>
      </div>
    </div>

    <div class="vstack gap-2">
      @for (tag of tags(); track tag.id) {
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <input
              class="form-check-input"
              type="checkbox"
              [id]="'noteTag-' + tag.id"
              [checked]="isTagSelected(tag.id)"
              [disabled]="isTagDeleted(tag)"
              (change)="toggleTag(tag.id, $event)"
            />
          </div>
          <div class="col-md-3">
            <input
              class="form-control form-control-sm"
              [value]="tag.draftNameRu"
              [disabled]="isTagDeleted(tag)"
              (input)="updateTagDraftNameRu(tag.id, $event)"
              [attr.aria-label]="'notes.form.tagNameRuAria' | t"
            />
          </div>
          <div class="col-md-3">
            <input
              class="form-control form-control-sm"
              [value]="tag.draftNameEn"
              [disabled]="isTagDeleted(tag)"
              (input)="updateTagDraftNameEn(tag.id, $event)"
              [attr.aria-label]="'notes.form.tagNameEnAria' | t"
            />
          </div>
          <div class="col-md-3">
            <input
              class="form-control form-control-sm"
              [value]="tag.draftSlug"
              [disabled]="isTagDeleted(tag)"
              (input)="updateTagDraftSlug(tag.id, $event)"
              [attr.aria-label]="'notes.form.tagSlugAria' | t"
            />
          </div>
          <div class="col-auto">
            @if (isTagDeleted(tag)) {
              <span class="badge text-bg-secondary">{{ 'shared.removed' | t }}</span>
            }
          </div>
          <div class="col d-flex justify-content-end gap-2">
            @if (isTagDeleted(tag)) {
              <button
                type="button"
                class="btn btn-sm btn-outline-success"
                (click)="restoreTag(tag.id)"
              >
                {{ 'shared.restore' | t }}
              </button>
            } @else {
              <button type="button" class="btn btn-sm btn-outline-primary" (click)="updateTag(tag)">
                {{ 'shared.save' | t }}
              </button>
              <button
                type="button"
                class="btn btn-sm btn-outline-danger"
                (click)="deleteTag(tag.id)"
              >
                {{ 'shared.delete' | t }}
              </button>
            }
          </div>
        </div>
      }
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-4">
    <button type="button" class="btn btn-outline-secondary" (click)="formCancel.emit()">
      {{ 'shared.cancel' | t }}
    </button>
    <button type="submit" class="btn btn-primary">{{ 'shared.save' | t }}</button>
  </div>
</form>
