<div class="localized-date-picker">
  <div class="input-group">
    <input
      [id]="inputId()"
      type="text"
      class="form-control"
      inputmode="numeric"
      autocomplete="off"
      [attr.placeholder]="placeholder()"
      [attr.aria-controls]="calendarId"
      [attr.aria-expanded]="calendarOpen()"
      [value]="displayValue()"
      (input)="onTextInput($event)"
      (blur)="onTextBlur()"
    />
    <button
      type="button"
      class="btn btn-outline-secondary localized-date-picker-toggle"
      data-testid="date-picker-toggle"
      [attr.aria-label]="openCalendarLabel()"
      [attr.aria-controls]="calendarId"
      [attr.aria-expanded]="calendarOpen()"
      (click)="toggleCalendar()"
    >
      <svg
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M8 2v4"></path>
        <path d="M16 2v4"></path>
        <rect width="18" height="18" x="3" y="4" rx="2"></rect>
        <path d="M3 10h18"></path>
      </svg>
    </button>
  </div>

  @if (calendarOpen()) {
    <div
      [id]="calendarId"
      class="localized-date-picker-calendar border rounded bg-body shadow-sm p-2"
      data-testid="date-picker-calendar"
    >
      <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary localized-date-picker-nav"
          [attr.aria-label]="previousMonthLabel()"
          (click)="showPreviousMonth()"
        >
          ‹
        </button>
        <div class="small fw-semibold text-center text-capitalize">{{ monthLabel() }}</div>
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary localized-date-picker-nav"
          [attr.aria-label]="nextMonthLabel()"
          (click)="showNextMonth()"
        >
          ›
        </button>
      </div>

      <div class="localized-date-picker-grid localized-date-picker-weekdays mb-1">
        @for (weekday of weekdayLabels(); track weekday) {
          <div class="text-body-secondary small text-center">{{ weekday }}</div>
        }
      </div>
      <div class="localized-date-picker-grid">
        @for (cell of calendarCells(); track $index) {
          @if (cell) {
            <button
              type="button"
              class="btn btn-sm localized-date-picker-day"
              [class.btn-success]="cell.selected"
              [class.btn-outline-secondary]="!cell.selected"
              [class.localized-date-picker-today]="cell.today"
              [attr.aria-label]="cell.ariaLabel"
              [attr.aria-pressed]="cell.selected"
              [attr.data-date]="cell.iso"
              (click)="selectDate(cell.iso)"
            >
              {{ cell.label }}
            </button>
          } @else {
            <span aria-hidden="true"></span>
          }
        }
      </div>
    </div>
  }
</div>
