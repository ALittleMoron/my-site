<div id="login-modal" class="modal force-display-block login-modal-backdrop">
  <form
    class="modal-dialog modal-fullscreen-sm-down"
    [formGroup]="form"
    (ngSubmit)="login()"
    novalidate
  >
    <div class="modal-content login-modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ 'auth.login.title' | t }}</h5>
        <button
          type="button"
          class="btn-close"
          [attr.aria-label]="'shared.close' | t"
          (click)="close()"
        ></button>
      </div>

      <div class="modal-body">
        <div class="alert alert-warning" role="alert">
          <strong>{{ 'auth.login.restrictedAccessWarning.title' | t }}</strong>
          <div>{{ 'auth.login.restrictedAccessWarning.message' | t }}</div>
        </div>

        @if (loginError()) {
          <div class="alert alert-danger" role="alert" aria-live="polite">
            {{ loginError() }}
          </div>
        }

        <div class="mb-3">
          <label for="username" class="form-label">{{ 'auth.login.username' | t }}</label>
          <input
            id="username"
            type="text"
            class="form-control"
            formControlName="username"
            autocomplete="username"
            [attr.aria-label]="'auth.login.username' | t"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">{{ 'auth.login.password' | t }}</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            autocomplete="current-password"
            [attr.aria-label]="'auth.login.password' | t"
          />
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="submit"
          class="btn button-active"
          [disabled]="form.invalid || submitting()"
          [attr.aria-label]="'auth.login.submit' | t"
        >
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
            {{ 'auth.login.submitting' | t }}
          } @else {
            {{ 'auth.login.submit' | t }}
          }
        </button>
      </div>
    </div>
  </form>
</div>
