<div
  id="login-modal"
  class="modal force-display-block"
  style="background-color: rgba(0, 0, 0, 0.5)"
>
  <form class="modal-dialog" [formGroup]="form" (ngSubmit)="login()" novalidate>
    <div class="modal-content" style="z-index: 1067">
      <div class="modal-header">
        <h5 class="modal-title">{{ 'auth.login.title' | t }}</h5>
        <button
          type="button"
          class="btn-close"
          [attr.aria-label]="'shared.close' | t"
          (click)="close()"
        ></button>
      </div>

      <div class="modal-body">
        @if (loginError()) {
          <div class="alert alert-danger" role="alert" aria-live="polite">
            {{ loginError() }}
          </div>
        }

        <div class="mb-3">
          <label for="username" class="form-label">{{ 'auth.login.username' | t }}</label>
          <input
            id="username"
            type="text"
            class="form-control"
            formControlName="username"
            autocomplete="username"
            [attr.aria-label]="'auth.login.username' | t"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">{{ 'auth.login.password' | t }}</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            autocomplete="current-password"
            [attr.aria-label]="'auth.login.password' | t"
          />
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="submit"
          class="btn button-active"
          [disabled]="form.invalid || submitting()"
          [attr.aria-label]="'auth.login.submit' | t"
        >
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
            {{ 'auth.login.submitting' | t }}
          } @else {
            {{ 'auth.login.submit' | t }}
          }
        </button>
      </div>
    </div>
  </form>
</div>
