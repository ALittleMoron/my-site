services:
  postgres-test:
    image: postgres:16-alpine
    container_name: my_site_postgres_test
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-my_site_database_test}
    ports:
      - "${DB_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-my_site_database_test}"]
      interval: 2s
      timeout: 10s
      retries: 30
